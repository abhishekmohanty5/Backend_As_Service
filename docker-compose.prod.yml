version: '3.8'

services:
  # SaaS Backend Application
  # Using host network to connect to your EC2-installed MariaDB at localhost:3306
  saas-backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: saas-backend
    network_mode: "host" 
    env_file:
      - .env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - saas-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      # Access health check on port 8080 (already on host network)
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  saas-logs:
    driver: local
