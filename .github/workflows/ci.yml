# ============================================================
# CI Pipeline — Aegis Infra SaaS Backend
# GitHub Actions Workflow
# ============================================================
# Triggers: push or PR to main / development branches
# Steps: Checkout → Setup JDK 21 → Cache Maven → Build → Test
# Database: H2 in-memory (no MySQL needed in CI)
# ============================================================

name: CI — Build & Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout code ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 2. Configure git authentication ──────────────────
      - name: Configure git authentication
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # ── 3. Set up JDK 21 ─────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # Caches ~/.m2 between runs for speed

      # ── 4. Build the project ──────────────────────────────
      - name: Build with Maven
        run: mvn clean compile -B --no-transfer-progress

      # ── 5. Run tests ──────────────────────────────────────
      # Uses src/test/resources/application.yml (H2 in-memory DB)
      # No MySQL, no secrets needed in CI
      - name: Run tests
        run: mvn test -B --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      # ── 6. Package the JAR ────────────────────────────────
      - name: Package JAR (skip tests, already ran above)
        run: mvn package -DskipTests -B --no-transfer-progress

      # ── 7. Upload JAR as build artifact ──────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: saas-backend-jar
          path: target/*.jar
          retention-days: 7
