# ============================================================
# Build & Deploy to AWS EC2 (Free Tier Optimized)
# ============================================================
name: Build & Deploy — SaaS Backend

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: ap-south-1
  EC2_INSTANCE: i-0e1879fa9f18592ce # Your existing instance ID
  APP_JAR_NAME: saas-0.0.1-SNAPSHOT.jar

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build the heavy JAR on GitHub (saves EC2 RAM)
      - name: Build JAR with Maven
        run: ./mvnw clean package -B -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: saas-backend-jar
          path: target/${{ env.APP_JAR_NAME }}

  deploy:
    name: Deploy to AWS EC2
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: saas-backend-jar
          path: .

      - name: Configure SSH Key
        run: |
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Step 1 — Write .env.prod and copy files to EC2
        run: |
          # Build the .env.prod file from GitHub Secrets so it never needs to
          # be stored inside the repository.
          # Use a temp file with restricted permissions so secret values are
          # not world-readable on the runner filesystem.
          ENV_FILE=$(mktemp)
          chmod 600 "$ENV_FILE"
          cat > "$ENV_FILE" <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_USER_NAME=${{ secrets.DATABASE_USER_NAME }}
          DATABASE_USER_PASSWORD=${{ secrets.DATABASE_USER_PASSWORD }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
          CORS_DEFAULT_ORIGINS=${{ secrets.CORS_DEFAULT_ORIGINS }}
          EOF
          # Export the path so the cleanup step can remove it even on failure
          echo "ENV_FILE=$ENV_FILE" >> "$GITHUB_ENV"

          # Create the deploy directory on EC2
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "mkdir -p ~/app"

          # Copy all required deployment artefacts
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ env.APP_JAR_NAME }} \
            Dockerfile.prod \
            docker-compose.prod.yml \
            "$ENV_FILE" \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/.env.prod

      - name: Step 2 — Run Docker Compose on EC2
        # Use 'docker compose' (v2 plugin) — the legacy 'docker-compose' binary
        # is not installed on modern Amazon Linux 2023 / Ubuntu 22.04 instances.
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOFSCRIPT'
          cd ~/app/
          # Stop any running instance gracefully
          docker compose -f docker-compose.prod.yml down --remove-orphans || true
          # Rebuild from the new JAR and start in the background
          docker compose -f docker-compose.prod.yml build --no-cache
          docker compose -f docker-compose.prod.yml up -d
          # Reclaim disk space — critical on free-tier instances
          docker image prune -f
          EOFSCRIPT

      - name: Step 3 — Verify Deployment Health
        # Retry for up to 90 s (t2.micro is slow to warm up Spring Boot).
        # Health check uses HTTP because SSL is not yet configured; the
        # /actuator/health endpoint does not expose sensitive data.
        run: |
          MAX_ATTEMPTS=9
          RETRY_INTERVAL=10
          echo "Waiting for Spring Boot to become healthy…"
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            if curl -sf http://${{ secrets.EC2_HOST }}:8080/actuator/health; then
              echo ""
              echo "✅ Deployment successful and healthy!"
              exit 0
            fi
            echo "Attempt $i/$MAX_ATTEMPTS — not ready yet, retrying in ${RETRY_INTERVAL}s…"
            sleep "$RETRY_INTERVAL"
          done
          echo "❌ Health check timed out after $((MAX_ATTEMPTS * RETRY_INTERVAL)) s"
          exit 1

      - name: Cleanup
        if: always()
        # 'if: always()' runs on success, failure, AND cancellation.
        run: rm -f private_key.pem "${ENV_FILE:-}"
