server:
  port: ${PORT:8080}

spring:
  application:
    name: aegis

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/aegis_infra?createDatabaseIfNotExist=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_EXPIRATION_MS:3600000}
    refresh-token:
      expiration: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}  # 7 days default
  cors:
    default-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

password:
  reset:
    token:
      expiration-hours: ${PASSWORD_RESET_TOKEN_EXPIRATION_HOURS:1}

email:
  token:
    expiration-hours: 24

saas:
  insights:
    yearly-switch-threshold: 500
    entertainment-category: Entertainment
    entertainment-max-count: 2
  churn:
    discount-code: ${CHURN_DISCOUNT_CODE:KEEP20}

gemini:
  api:
    base-url: ${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com}
    version: ${GEMINI_API_VERSION:v1beta}
    key: ${GEMINI_API_KEY}
    model: ${GEMINI_MODEL:gemini-2.5-flash}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
