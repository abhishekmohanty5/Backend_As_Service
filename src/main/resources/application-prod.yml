# Production specific configuration
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: update # Usually 'none' or 'validate' in real prod, but keeping 'update' as per user's file

application:
  cors:
    default-origins: ${CORS_ALLOWED_ORIGINS:https://saas-frontend2-0.vercel.app/}

# In production, we might want different logging levels
logging:
  level:
    root: WARN
    com.aegis.saas: INFO
